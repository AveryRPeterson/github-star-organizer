name: Organize Stars
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Organize
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python3 categorize.py
