name: Maintenance
on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 6am PST (2pm UTC) — categorize
    - cron: '0 14 * * 0'  # Sundays at 6am PST — categorize + distill
  workflow_dispatch:
    inputs:
      run_distill:
        description: 'Also run distill step'
        type: boolean
        default: false

jobs:
  categorize:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state DB
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: state.db
          key: github-star-state-v1-${{ github.run_id }}
          restore-keys: github-star-state-v1-

      - name: Recover DB from backup branch (cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          git fetch origin state-backup 2>/dev/null && \
          git checkout origin/state-backup -- state.db 2>/dev/null || true

      - name: Organize Stars
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python3 categorize.py

      - name: Save state DB to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.db
          key: github-star-state-v1-${{ github.run_id }}

      - name: Backup DB to state-backup branch
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin state-backup 2>/dev/null || true
          if git ls-remote --exit-code origin state-backup 2>/dev/null; then
            git checkout state-backup
          else
            git checkout --orphan state-backup
            git rm -rf . 2>/dev/null || true
          fi
          cp ${{ github.workspace }}/state.db state.db 2>/dev/null || true
          git add state.db
          git diff --cached --quiet || git commit -m "Daily state backup $(date -u +%Y-%m-%d)"
          git push origin state-backup

  distill:
    needs: categorize
    if: >
      github.event.schedule == '0 14 * * 0' ||
      github.event.inputs.run_distill == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state DB
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: state.db
          key: github-star-state-v1-${{ github.run_id }}
          restore-keys: github-star-state-v1-

      - name: Recover DB from backup branch (cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          git fetch origin state-backup 2>/dev/null && \
          git checkout origin/state-backup -- state.db 2>/dev/null || true

      - name: Run Distillation
        id: distillation
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python distill.py

      - name: Create Pull Request
        if: steps.distillation.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "Automated: Update config.json keywords from uncategorized stars (${{ steps.distillation.outputs.date_suffix }})"
          title: "Distillation: Update Star Categories (${{ steps.distillation.outputs.date_suffix }})"
          body: |
            This PR was automatically generated by the Distill Keywords runner.

            ## Distillation Summary
            ${{ steps.distillation.outputs.summary }}
          branch: "distill-keywords"
          delete-branch: true
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

      - name: Backup DB to state-backup branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin state-backup 2>/dev/null || true
          if git ls-remote --exit-code origin state-backup 2>/dev/null; then
            git checkout state-backup
          else
            git checkout --orphan state-backup
            git rm -rf . 2>/dev/null || true
          fi
          cp ${{ github.workspace }}/state.db state.db 2>/dev/null || true
          git add state.db
          git diff --cached --quiet || git commit -m "Weekly state backup $(date -u +%Y-%m-%d)"
          git push origin state-backup
