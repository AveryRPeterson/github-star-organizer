name: Discover Repos

on:
  schedule:
    - cron: '0 23 * * 6'  # Saturday 11pm UTC (1 hour before distill.yml)
  workflow_dispatch:

jobs:
  discover-repos:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover Repos
        id: discover_repos
        env:
          GH_TOKEN: ${{ github.token }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OLLAMA_CLOUD_KEY: ${{ secrets.OLLAMA_CLOUD_KEY }}
        run: python discover_repos.py

      - name: Report Summary
        if: always()
        env:
          REPOS_FOUND: ${{ steps.discover_repos.outputs.repos_found }}
          REPOS_REPORTED: ${{ steps.discover_repos.outputs.repos_reported }}
          REPOS_DISCOVERED: ${{ steps.discover_repos.outputs.repos_discovered }}
          DATE_SUFFIX: ${{ steps.discover_repos.outputs.date_suffix }}
        run: |
          echo "Repos found: $REPOS_FOUND"
          echo "Repos reported: $REPOS_REPORTED"
          echo "Repos discovered: $REPOS_DISCOVERED"
          echo "Week: $DATE_SUFFIX"
