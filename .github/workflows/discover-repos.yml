name: Discover Repos

on:
  schedule:
    - cron: '0 23 * * 6'  # Saturday 11pm UTC
  workflow_dispatch:
    inputs:
      discovery_count:
        description: 'Number of repos to discover (default: 13)'
        type: number
        default: 13

jobs:
  discover-repos:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state DB
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: state.db
          key: github-star-state-v1-${{ github.run_id }}
          restore-keys: github-star-state-v1-

      - name: Recover DB from backup branch (cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          git fetch origin state-backup 2>/dev/null && \
          git checkout origin/state-backup -- state.db 2>/dev/null || true

      - name: Discover Repos
        id: discover_repos
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          DISCOVERY_COUNT: ${{ github.event.inputs.discovery_count || '13' }}
        run: python discover_repos.py

      - name: Save state DB to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.db
          key: github-star-state-v1-${{ github.run_id }}

      - name: Backup DB to state-backup branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin state-backup 2>/dev/null || true
          if git ls-remote --exit-code origin state-backup 2>/dev/null; then
            git checkout state-backup
          else
            git checkout --orphan state-backup
            git rm -rf . 2>/dev/null || true
          fi
          cp ${{ github.workspace }}/state.db state.db 2>/dev/null || true
          git add state.db
          git diff --cached --quiet || git commit -m "Discovery state backup $(date -u +%Y-%m-%d)"
          git push origin state-backup

      - name: Report Summary
        if: always()
        env:
          REPOS_FOUND: ${{ steps.discover_repos.outputs.repos_found }}
          REPOS_REPORTED: ${{ steps.discover_repos.outputs.repos_reported }}
          REPOS_DISCOVERED: ${{ steps.discover_repos.outputs.repos_discovered }}
          DATE_SUFFIX: ${{ steps.discover_repos.outputs.date_suffix }}
        run: |
          echo "Repos found: $REPOS_FOUND"
          echo "Repos reported: $REPOS_REPORTED"
          echo "Repos discovered: $REPOS_DISCOVERED"
          echo "Week: $DATE_SUFFIX"
