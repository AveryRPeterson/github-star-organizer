name: Distill Keywords
on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  distill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run Distillation
        id: distillation
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python distill.py
        
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "Automated: Update config.json keywords from uncategorized stars (${{ steps.distillation.outputs.date_suffix }})"
          title: "Distillation: Update Star Categories (${{ steps.distillation.outputs.date_suffix }})"
          body: "This PR was automatically generated by the Distill Keywords runner. It analyzes uncategorized stars from issue #${{ steps.distillation.outputs.issue_num }} and suggests improvements to `config.json`."
          branch: "distill-keywords"
          delete-branch: true
